apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-to-splunk-csm
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://git.internal.example.com/monitoring/api-to-splunk.git
    targetRevision: main
    path: charts/api-to-splunk
    helm:
      valueFiles:
        - values.yaml
      values: |
        global:
          platform: csm
        networkPolicy:
          apiEndpoints:
            - csm-main.example.com
            - csm-dr.example.com
  destination:
    server: https://kubernetes.default.svc
    namespace: mainframe-monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

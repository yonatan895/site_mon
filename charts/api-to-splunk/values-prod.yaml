image:
  registry: ghcr.io
  repository: yonatan895/site_mon/site-mon
  tag: "1.0.0"
  pullPolicy: IfNotPresent

replicaCount: 2

poller:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

config:
  logLevel: "WARNING"
  hec:
    url: "https://splunk-hec.internal.example.com:8088"
    batchSize: 500
    ackEnabled: true
    maxConnections: 10
    timeout: 30
  spool:
    maxSizeMb: 1024
  verifySsl: true

networkPolicy:
  enabled: true
  splunkHecCidrs: []
  apiEndpointCidrs: []

pvc:
  size: "5Gi"

pdb:
  minAvailable: 1

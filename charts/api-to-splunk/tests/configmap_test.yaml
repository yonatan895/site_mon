suite: configmap
release:
  name: test-release
  namespace: test-ns
set:
  global:
    platform: hmc
templates:
  - configmap.yaml
tests:
  - it: should set PLATFORM from values
    asserts:
      - equal:
          path: data.PLATFORM
          value: "hmc"

  - it: should set POLL_INTERVAL_SECONDS from values
    set:
      global:
        platform: ds
      config:
        pollIntervalSeconds: 600
    asserts:
      - equal:
          path: data.POLL_INTERVAL_SECONDS
          value: "600"

  - it: should set SPLUNK_HEC_URL from values
    set:
      config:
        hec:
          url: "https://splunk.example.com:8088"
    asserts:
      - equal:
          path: data.SPLUNK_HEC_URL
          value: "https://splunk.example.com:8088"

  - it: should set SPLUNK_HEC_BATCH_SIZE
    set:
      config:
        hec:
          batchSize: 500
    asserts:
      - equal:
          path: data.SPLUNK_HEC_BATCH_SIZE
          value: "500"

  - it: should set SPLUNK_HEC_ACK_ENABLED
    set:
      config:
        hec:
          ackEnabled: true
    asserts:
      - equal:
          path: data.SPLUNK_HEC_ACK_ENABLED
          value: "true"

  - it: should set SPLUNK_HEC_MAX_CONNECTIONS
    set:
      config:
        hec:
          maxConnections: 20
    asserts:
      - equal:
          path: data.SPLUNK_HEC_MAX_CONNECTIONS
          value: "20"

  - it: should set SPLUNK_HEC_TIMEOUT
    set:
      config:
        hec:
          timeout: 60
    asserts:
      - equal:
          path: data.SPLUNK_HEC_TIMEOUT
          value: "60"

  - it: should set SPOOL_MAX_SIZE_MB
    set:
      config:
        spool:
          maxSizeMb: 2048
    asserts:
      - equal:
          path: data.SPOOL_MAX_SIZE_MB
          value: "2048"

  - it: should set SPOOL_DIR to /spool
    asserts:
      - equal:
          path: data.SPOOL_DIR
          value: "/spool"

  - it: should set RULES_DIR to /rules
    asserts:
      - equal:
          path: data.RULES_DIR
          value: "/rules"

  - it: should set LOG_LEVEL from values
    set:
      config:
        logLevel: "WARNING"
    asserts:
      - equal:
          path: data.LOG_LEVEL
          value: "WARNING"

  - it: should set health probe config
    set:
      config:
        healthProbeInterval: 30
        maxConsecutiveFailures: 5
    asserts:
      - equal:
          path: data.HEALTH_PROBE_INTERVAL
          value: "30"
      - equal:
          path: data.MAX_CONSECUTIVE_FAILURES
          value: "5"

  - it: should set VERIFY_SSL from values
    set:
      config:
        verifySsl: false
    asserts:
      - equal:
          path: data.VERIFY_SSL
          value: "false"

  - it: should have name with -config suffix
    asserts:
      - equal:
          path: metadata.name
          value: test-release-api-to-splunk-hmc-config

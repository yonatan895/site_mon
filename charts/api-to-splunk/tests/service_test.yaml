suite: service
release:
  name: test-release
  namespace: test-ns
templates:
  - service.yaml
tests:
  - it: should be a ClusterIP service
    set:
      global:
        platform: hmc
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should have poller-health port from values
    set:
      global:
        platform: hmc
      service:
        port: 8080
        targetPort: 8080
    asserts:
      - contains:
          path: spec.ports
          content:
            name: poller-health
            port: 8080
            targetPort: 8080
            protocol: TCP

  - it: should have sender-health port fixed at 8081
    set:
      global:
        platform: hmc
    asserts:
      - contains:
          path: spec.ports
          content:
            name: sender-health
            port: 8081
            targetPort: 8081
            protocol: TCP

  - it: should have name from fullname helper
    set:
      global:
        platform: hmc
    asserts:
      - equal:
          path: metadata.name
          value: test-release-api-to-splunk-hmc

  - it: should have selector labels
    set:
      global:
        platform: hmc
    asserts:
      - exists:
          path: spec.selector["app.kubernetes.io/name"]
      - exists:
          path: spec.selector["app.kubernetes.io/instance"]

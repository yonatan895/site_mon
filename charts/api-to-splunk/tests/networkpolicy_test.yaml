suite: networkpolicy
release:
  name: test-release
  namespace: test-ns
set:
  global:
    platform: hmc
templates:
  - networkpolicy.yaml
tests:
  - it: should create NetworkPolicy when enabled
    set:
      networkPolicy:
        enabled: true
        splunkHecCidrs: []
        apiEndpointCidrs: []
    asserts:
      - equal:
          path: kind
          value: NetworkPolicy
      - equal:
          path: metadata.name
          value: test-release-api-to-splunk-hmc

  - it: should not create NetworkPolicy when disabled
    set:
      networkPolicy:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should allow DNS egress
    set:
      networkPolicy:
        enabled: true
        splunkHecCidrs: []
        apiEndpointCidrs: []
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - ipBlock:
                  cidr: 0.0.0.0/0
            ports:
              - protocol: UDP
                port: 53

  - it: should include Splunk HEC egress rule when CIDRs set
    set:
      networkPolicy:
        enabled: true
        splunkHecCidrs:
          - 10.0.0.0/8
        apiEndpointCidrs: []
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - ipBlock:
                  cidr: 10.0.0.0/8
            ports:
              - protocol: TCP
                port: 8088

  - it: should include API endpoint egress rules for CIDRs
    set:
      networkPolicy:
        enabled: true
        splunkHecCidrs: []
        apiEndpointCidrs:
          - 192.168.1.0/24
          - 172.16.0.0/12
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - ipBlock:
                  cidr: 192.168.1.0/24
            ports:
              - protocol: TCP
                port: 443
      - contains:
          path: spec.egress
          content:
            to:
              - ipBlock:
                  cidr: 172.16.0.0/12
            ports:
              - protocol: TCP
                port: 443

  - it: should have policyTypes ingress and egress
    set:
      networkPolicy:
        enabled: true
        splunkHecCidrs: []
        apiEndpointCidrs: []
    asserts:
      - contains:
          path: spec.policyTypes
          content: Ingress
      - contains:
          path: spec.policyTypes
          content: Egress

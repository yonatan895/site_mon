suite: pvc
release:
  name: test-release
  namespace: test-ns
set:
  global:
    platform: hmc
templates:
  - pvc.yaml
tests:
  - it: should have ReadWriteMany access
    asserts:
      - contains:
          path: spec.accessModes
          content: ReadWriteMany

  - it: should use default size 1Gi
    set:
      pvc:
        size: 1Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 1Gi

  - it: should use production size 5Gi
    set:
      pvc:
        size: 5Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 5Gi

  - it: should have name with -spool suffix
    asserts:
      - equal:
          path: metadata.name
          value: test-release-api-to-splunk-hmc-spool

  - it: should not include storageClassName when empty
    set:
      pvc:
        storageClassName: ""
    asserts:
      - notExists:
          path: spec.storageClassName

  - it: should include storageClassName when set
    set:
      pvc:
        storageClassName: fast-ssd
    asserts:
      - equal:
          path: spec.storageClassName
          value: fast-ssd

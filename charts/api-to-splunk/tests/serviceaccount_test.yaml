suite: serviceaccount
release:
  name: test-release
  namespace: test-ns
set:
  global:
    platform: hmc
templates:
  - serviceaccount.yaml
tests:
  - it: should create ServiceAccount when enabled
    set:
      serviceAccount:
        create: true
        name: api-to-splunk-sa
        annotations: {}
    asserts:
      - equal:
          path: metadata.name
          value: api-to-splunk-sa
      - equal:
          path: kind
          value: ServiceAccount

  - it: should not create ServiceAccount when disabled
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should include annotations when set
    set:
      serviceAccount:
        create: true
        name: api-to-splunk-sa
        annotations:
          eks.amazonaws.com/role-arn: "arn:aws:iam::123456:role/vault"
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456:role/vault"

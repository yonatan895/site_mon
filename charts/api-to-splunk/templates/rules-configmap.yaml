apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.rulesConfigMap.name }}
  labels:
    {{- include "api-to-splunk.labels" . | nindent 4 }}
data:
  {{- range $path, $_ := .Files.Glob "files/rules/**/*.yaml" }}
  {{- $relpath := trimPrefix "files/rules/" $path }}
  {{ $relpath }}: |
    {{- $.Files.Get $path | nindent 4 }}
  {{- end }}

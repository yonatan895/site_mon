# TS7700 Platform - Source Policy
# Defines data source failover behavior, health checks, and rate limiting.
platform: ts7700
failover_mode: "primary_backup"

health_check:
  path: "/api/v1/health"
  interval_seconds: 60
  timeout_seconds: 10
  max_consecutive_failures: 3

primary_data_types:
  - cluster
  - cache
  - drives
  - replication

backup_data_types:
  - cluster

rate_limit:
  requests_per_second: 5

# CSM Site - Main
# Primary CSM endpoint for full data type collection (dual-active mode).
site_name: csm-main
platform: csm
is_primary: true

endpoints:
  - name: csm-main
    url: "https://csm-main.example.com"
    platform: csm
    site: main
    auth_type: basic
    creds_vault_path: "secret/mainframe/csm/main"
    rate_limit_rps: 5
    timeout: 30

data_types:
  - sessions
  - policies
  - replication

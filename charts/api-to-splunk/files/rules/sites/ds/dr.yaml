# DS8000 Site - DR
# Disaster recovery DS8000 endpoint for full data type collection (dual-active mode).
site_name: ds-dr
platform: ds
is_primary: false

endpoints:
  - name: ds-dr
    url: "https://ds-dr.example.com"
    platform: ds
    site: dr
    auth_type: basic
    creds_vault_path: "secret/mainframe/ds/dr"
    rate_limit_rps: 5
    timeout: 30
    health_path: null

data_types:
  - arrays
  - ports
  - ranks
  - replication

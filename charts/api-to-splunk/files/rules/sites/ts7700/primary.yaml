# TS7700 Site - Primary
# Primary TS7700 endpoint for full data type collection.
site_name: ts7700-primary
platform: ts7700
is_primary: true

endpoints:
  - name: ts7700-primary
    url: "https://ts7700-primary.example.com"
    platform: ts7700
    site: primary
    auth_type: basic
    creds_vault_path: "secret/mainframe/ts7700/primary"
    rate_limit_rps: 5
    timeout: 30

data_types:
  - cluster
  - cache
  - drives
  - replication

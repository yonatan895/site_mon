name: Nightly Scan

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/site-mon
  IMAGE_TAG: nightly-${{ github.sha }}

jobs:
  full-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image (with dev deps)
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: INSTALL_DEV=true
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Full test suite
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            python -m pytest tests/ -v \
              --cov=src \
              --cov-report=term \
              --junitxml=/app/junit-nightly.xml

      - name: Python dependency audit
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            pip-audit

      - name: Full container vulnerability scan
        uses: aquasecurity/trivy-action@1.0.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          output: trivy-report.txt
          severity: LOW,MEDIUM,HIGH,CRITICAL

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-scan-results
          path: |
            junit-nightly.xml
            trivy-report.txt

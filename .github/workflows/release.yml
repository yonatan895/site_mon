name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/site-mon
  HELM_REGISTRY: ghcr.io
  HELM_REPO: ${{ github.repository }}/charts

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: INSTALL_DEV=true
          load: true
          tags: site-mon:check
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Lint + format
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app site-mon:check \
            python -m ruff check src/ tests/
          docker run --rm -v ${{ github.workspace }}:/app -w /app site-mon:check \
            python -m ruff format --check src/ tests/

      - name: Type check
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app site-mon:check \
            python -m mypy src/

      - name: Tests
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app site-mon:check \
            python -m pytest tests/ -v --cov=src --cov-fail-under=85

      - name: pip-audit
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app site-mon:check \
            pip-audit

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: site-mon:check
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

  release:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_NUM="${VERSION#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "VERSION_NUM=${VERSION_NUM}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package Helm chart
        run: |
          helm package charts/api-to-splunk \
            --version ${{ steps.version.outputs.VERSION_NUM }} \
            --app-version ${{ steps.version.outputs.VERSION_NUM }}

      - name: Login to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart to GHCR
        run: |
          helm push api-to-splunk-${{ steps.version.outputs.VERSION_NUM }}.tgz \
            oci://${{ env.HELM_REGISTRY }}/${{ env.HELM_REPO }}

name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/site-mon
  HELM_REGISTRY: ghcr.io
  HELM_REPO: ${{ github.repository }}/charts

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and test (dev image)
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: INSTALL_DEV=true
          load: true
          tags: site-mon:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            site-mon:test \
            python -m pytest tests/ -v \
              --cov=src \
              --cov-fail-under=85

  release:
    needs: check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package Helm chart
        run: |
          helm package charts/api-to-splunk \
            --version ${{ steps.version.outputs.VERSION }} \
            --app-version ${{ steps.version.outputs.VERSION }}

      - name: Login to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart to GHCR
        run: |
          helm push api-to-splunk-${{ steps.version.outputs.VERSION }}.tgz \
            oci://${{ env.HELM_REGISTRY }}/${{ env.HELM_REPO }}

      - name: Update Helm values with release image tag
        run: |
          sed -i "s|^  tag: .*|  tag: ${{ steps.version.outputs.VERSION }}|" charts/api-to-splunk/values-prod.yaml

      - name: Commit and push values update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/api-to-splunk/values-prod.yaml
          git diff --staged --quiet || (
            git commit -m "chore: bump image tag to ${{ steps.version.outputs.VERSION }}"
            git push
          )

name: CI

on:
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/site-mon
  IMAGE_TAG: ci-${{ github.sha }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: INSTALL_DEV=true
          load: true
          no-cache: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Lint - ruff check
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            python -m ruff check src/ tests/

      - name: Lint - ruff format check
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            python -m ruff format --check src/ tests/

      - name: Type check - mypy
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            python -m mypy src/

      - name: Unit tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            python -m pytest tests/ -v -m "not integration" \
              --cov=src \
              --cov-report=xml:/app/coverage-unit.xml \
              --cov-report=term \
              --cov-fail-under=85 \
              --junitxml=/app/junit-unit.xml

      - name: Integration tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            python -m pytest tests/ -v -m "integration" \
              --cov=src \
              --cov-report=xml:/app/coverage-integration.xml \
              --cov-report=term \
              --junitxml=/app/junit-integration.xml

      - name: Python dependency audit
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            pip-audit

      - name: Container vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage-unit.xml
            coverage-integration.xml
            junit-unit.xml
            junit-integration.xml

  helm-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 0.7.0

      - name: Helm lint
        run: helm lint charts/api-to-splunk

      - name: Helm lint production values
        run: helm lint charts/api-to-splunk -f charts/api-to-splunk/values-prod.yaml

      - name: Helm lint airgap values
        run: helm lint charts/api-to-splunk -f charts/api-to-splunk/values-airgap.yaml

      - name: Helm unit tests
        run: helm unittest charts/api-to-splunk

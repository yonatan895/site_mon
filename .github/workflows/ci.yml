name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/site-mon
  IMAGE_TAG: ci-${{ github.sha }}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: INSTALL_DEV=true
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Lint - ruff check
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            python -m ruff check src/ tests/

      - name: Lint - ruff format check
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            python -m ruff format --check src/ tests/

      - name: Type check - mypy
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            python -m mypy src/

      - name: Tests + coverage
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            python -m pytest tests/ -v \
              --cov=src \
              --cov-report=xml:/app/coverage.xml \
              --cov-report=term \
              --cov-fail-under=85 \
              --junitxml=/app/junit.xml

      - name: Python dependency audit
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            pip-audit

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            coverage.xml
            junit.xml

  helm-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.15.0

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 0.7.0

      - name: Helm unit tests
        run: helm unittest charts/api-to-splunk

      - name: Helm lint
        run: |
          helm lint charts/api-to-splunk \
            -f charts/api-to-splunk/values.yaml \
            -f charts/api-to-splunk/values-prod.yaml \
            -f charts/api-to-splunk/values-airgap.yaml
